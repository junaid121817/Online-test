<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USAT MCQ Test</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.quiz-box{
    width:750px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{ margin-bottom:20px; }

.option{
    background:#eee;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.option:hover{
    background:#d7e6ff;
}

.correct{
    background:green !important;
    color:white;
}

.wrong{
    background:red !important;
    color:white;
}

#nextBtn{
    margin-top:20px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    display:none;
}
</style>
</head>

<body>

<div class="quiz-box">
    <h2 id="question"></h2>
    <div id="options"></div>
    <button id="nextBtn" onclick="nextQuestion()">Next</button>
</div>

<script>


const quizData = [
{
question:"1. The average of first eight whole numbers is:",
options:["3.0","3.5","4.0","4.5"],
answer:"3.5"
},
{
question:"2. What amount should be invested in a bank to get a profit of Rs. 4200 at a rate of 6% per annum for 5 years?",
options:["12000","14000","15000","16000"],
answer:"14000"
},
{
question:"3. What is the angle between the hands of a clock at 8:00?",
options:["90°","100°","120°","150°"],
answer:"120°"
},
{
question:"4. The multiplicative inverse of -7/9 is:",
options:["-7/9","-9/7","7/9","9/7"],
answer:"-9/7"
},
{
question:"5. If f(x) = x² + 4kx − 50 and f(3)=10, then value of k is:",
options:["17/4","4/17","-4/17","0"],
answer:"17/4"
},
{
question:"6. A dice is rolled twice. Probability of getting sum 5 is:",
options:["1/36","1/18","1/9","1/6"],
answer:"1/9"
},
{
question:"7. The next term in the sequence 2, 6, 12, 20, 30, ___ is:",
options:["38","40","42","44"],
answer:"42"
},
{
question:"8. A coin is tossed twice. Probability of getting doublets is:",
options:["1/4","1/2","3/4","1"],
answer:"1/2"
},
{
question:"9. Ratio of volumes of two pyramids (same height, base ratio 3:7) is:",
options:["3:7","9:49","27:343","81:1728"],
answer:"9:49"
},
{
question:"10. Two numbers added to mean problem give numbers:",
options:["7 and 11","4 and 8","8 and 12","9 and 13"],
answer:"8 and 12"
},
{
question:"11. Which of the following does NOT form a triangle?",
options:["5,9,7","6,6,10","7,5,12","15,25,34"],
answer:"7,5,12"
},
{
question:"12. log2(2) + log5(5) + log3(3) = ?",
options:["0","1","2","3"],
answer:"3"
},
{
question:"13. Sum of exterior angles of a regular octagon is:",
options:["30°","45°","360°","1080°"],
answer:"360°"
},
{
question:"14. If f(x)=5a, it is a:",
options:["constant function","identity function","one-one function","quadratic function"],
answer:"constant function"
},
{
question:"15. 75% of what number is 51?",
options:["38.25","68","100","136"],
answer:"68"
},
{
question:"16. Which of the following is a perfect number?",
options:["24","26","28","32"],
answer:"28"
},
{
question:"17. Area of right triangle (base 5 cm, hypotenuse 13 cm) is:",
options:["30 cm²","32.5 cm²","60 cm²","65 cm²"],
answer:"30 cm²"
},
{
question:"18. Total amount on Rs. 18000 at 5% for 5 years is:",
options:["22500","22000","21500","20000"],
answer:"22500"
},
{
question:"19. Sum of interior angles of a hexagon is:",
options:["180°","360°","540°","720°"],
answer:"720°"
},
{
question:"20. Range of data 2,7,9,13,2,0,3,-3,7,9,14 is:",
options:["11","13","14","none of these"],
answer:"none of these"
},
{
question:"21. Time for pipe B alone to fill tank is:",
options:["20 min","22.5 min","30 min","35.5 min"],
answer:"22.5 min"
},
{
question:"22. Remaining food lasts for:",
options:["8 days","9 days","10 days","12 days"],
answer:"10 days"
},
{
question:"23. Original number of balls purchased:",
options:["10","15","20","25"],
answer:"15"
},
{
question:"24. Difference between place and face value of 4 in 58413 is:",
options:["0","396","3996","4000"],
answer:"3996"
},
{
question:"25. Area of circle (diameter 14 cm) is:",
options:["154 cm²","308 cm²","616 cm²","1232 cm²"],
answer:"154 cm²"
},
{
question:"26. Solve (2x-3)/4 - x/6 = 5/2",
options:["6","9","12","15"],
answer:"9"
},
{
question:"27. Larger number in ratio 5:7 with sum 96 is:",
options:["40","48","56","64"],
answer:"56"
},
{
question:"28. Removed number when average changes is:",
options:["20","24","26","28"],
answer:"26"
},
{
question:"29. Volume of cylinder (r=7, h=10) is:",
options:["1540 cm³","154 cm³","3080 cm³","770 cm³"],
answer:"1540 cm³"
},
{
question:"30. Which is a perfect square?",
options:["1444","1458","1462","1470"],
answer:"1444"
}
];


let current = 0;
let score = 0;

function loadQuestion(){

    let q = quizData[current];

    document.getElementById("question").innerText = q.question;

    let optionsBox = document.getElementById("options");
    optionsBox.innerHTML = "";

    document.getElementById("nextBtn").style.display = "none";

    q.options.forEach(opt => {

        let div = document.createElement("div");
        div.classList.add("option");
        div.innerText = opt;

        div.onclick = function(){
            checkAnswer(div, opt);
        };

        optionsBox.appendChild(div);

    });

}

function checkAnswer(selectedDiv, answer){

    let correct = quizData[current].answer;

    let all = document.querySelectorAll(".option");

    all.forEach(el => {
        el.style.pointerEvents = "none";

        if(el.innerText === correct){
            el.classList.add("correct");
        }
    });

    if(answer !== correct){
        selectedDiv.classList.add("wrong");
    } else {
        score++;
    }

    document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion(){

    current++;

    if(current < quizData.length){
        loadQuestion();
    } else {
        document.querySelector(".quiz-box").innerHTML = `
            <h1>Quiz Completed</h1>
            <h2>Your Score: ${score} / ${quizData.length}</h2>
        `;
    }
}

loadQuestion();

</script>

</body>
</html>
